<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observatory — AI Agent Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-container"></div>

  <!-- Search button (top-right) -->
  <button id="search-btn" title="Search files (⌘P)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </button>

  <!-- Command palette overlay -->
  <div id="cmd-palette-overlay">
    <div id="cmd-palette">
      <div id="cmd-palette-input-wrap">
        <span id="cmd-palette-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input id="cmd-palette-input" type="text" placeholder="Search files by name..." autocomplete="off" spellcheck="false" />
      </div>
      <div id="cmd-palette-results"></div>
    </div>
  </div>

  <div id="status-bar">
    <span class="dot" id="ws-dot"></span>
    <span id="ws-label">connecting…</span>
  </div>

  <!-- Terminal overlay backdrop -->
  <div id="terminal-backdrop"></div>

  <!-- Terminal panel — left-docked side panel -->
  <div id="terminal-panel">
    <div class="resize-handle rh-e" data-dir="e"></div>
    <div id="terminal-header">
      <div id="terminal-tabs"></div>
      <div id="terminal-actions">
        <button id="terminal-close" title="close terminal">✕</button>
      </div>
    </div>
    <div id="terminal-container"></div>
  </div>

  <!-- FAB: agent launcher -->
  <div id="fab">
    <div id="fab-menu"></div>
    <button id="fab-btn" title="Agents">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="12" rx="2" /><line x1="2" y1="20" x2="22" y2="20" /><circle cx="9" cy="10" r="1.5" fill="currentColor" stroke="none" /><circle cx="15" cy="10" r="1.5" fill="currentColor" stroke="none" />
      </svg>
    </button>
  </div>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>

  <!-- CodeMirror 6 (ESM via esm.sh) -->
  <script type="importmap">
  {
    "imports": {
      "codemirror": "https://esm.sh/*codemirror@6.0.1",
      "@codemirror/view": "https://esm.sh/*@codemirror/view@6.36.5",
      "@codemirror/state": "https://esm.sh/*@codemirror/state@6.5.2",
      "@codemirror/language": "https://esm.sh/*@codemirror/language@6.11.0",
      "@codemirror/commands": "https://esm.sh/*@codemirror/commands@6.8.1",
      "@codemirror/search": "https://esm.sh/*@codemirror/search@6.5.10",
      "@codemirror/autocomplete": "https://esm.sh/*@codemirror/autocomplete@6.18.6",
      "@codemirror/lang-javascript": "https://esm.sh/*@codemirror/lang-javascript@6.2.3",
      "@codemirror/lang-json": "https://esm.sh/*@codemirror/lang-json@6.0.1",
      "@codemirror/lang-html": "https://esm.sh/*@codemirror/lang-html@6.4.9",
      "@codemirror/lang-css": "https://esm.sh/*@codemirror/lang-css@6.3.1",
      "@codemirror/lang-python": "https://esm.sh/*@codemirror/lang-python@6.1.7",
      "@codemirror/lang-rust": "https://esm.sh/*@codemirror/lang-rust@6.0.2",
      "@codemirror/lang-go": "https://esm.sh/*@codemirror/lang-go@6.0.1",
      "@codemirror/lang-markdown": "https://esm.sh/*@codemirror/lang-markdown@6.3.2",
      "@codemirror/theme-one-dark": "https://esm.sh/*@codemirror/theme-one-dark@6.1.2",
      "@lezer/common": "https://esm.sh/*@lezer/common@1.2.3",
      "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.1",
      "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.2",
      "@lezer/javascript": "https://esm.sh/*@lezer/javascript@1.4.21",
      "@lezer/json": "https://esm.sh/*@lezer/json@1.0.2",
      "@lezer/html": "https://esm.sh/*@lezer/html@1.3.10",
      "@lezer/css": "https://esm.sh/*@lezer/css@1.1.9",
      "@lezer/python": "https://esm.sh/*@lezer/python@1.1.15",
      "@lezer/rust": "https://esm.sh/*@lezer/rust@1.0.2",
      "@lezer/go": "https://esm.sh/*@lezer/go@1.0.0",
      "@lezer/markdown": "https://esm.sh/*@lezer/markdown@1.4.1",
      "style-mod": "https://esm.sh/*style-mod@4.1.2",
      "w3c-keyname": "https://esm.sh/*w3c-keyname@2.2.8",
      "crelt": "https://esm.sh/*crelt@1.0.6",
      "@marijn/find-cluster-break": "https://esm.sh/*@marijn/find-cluster-break@1.0.2"
    }
  }
  </script>
  <script type="module" src="file-viewer.js"></script>
  <script src="file-link-provider.js"></script>
<script src="command-palette.js"></script>

  <script src="game.js"></script>
</body>
</html>

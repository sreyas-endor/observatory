<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Sky background (transparent for embedding) -->

  <!-- Stars -->
  <circle cx="20" cy="18" r="1.5" fill="#e0e0ff" opacity="0.9"/>
  <circle cx="45" cy="10" r="1" fill="#e0e0ff" opacity="0.7"/>
  <circle cx="78" cy="15" r="1.5" fill="#e0e0ff" opacity="0.8"/>
  <circle cx="105" cy="22" r="1" fill="#e0e0ff" opacity="0.6"/>
  <circle cx="95" cy="8" r="1.2" fill="#e0e0ff" opacity="0.9"/>
  <circle cx="15" cy="38" r="1" fill="#e0e0ff" opacity="0.5"/>
  <circle cx="112" cy="42" r="1.3" fill="#e0e0ff" opacity="0.7"/>
  <circle cx="60" cy="5" r="1" fill="#e0e0ff" opacity="0.6"/>

  <!-- Telescope beam (light ray going up-right) -->
  <polygon points="58,52 108,12 112,16 62,56" fill="url(#beam)" opacity="0.35"/>
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c83ff"/>
      <stop offset="100%" stop-color="#7c83ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Observatory dome -->
  <path d="M34,72 Q34,44 64,44 Q94,44 94,72 Z" fill="#2a2a4e"/>
  <path d="M34,72 Q34,44 64,44 Q94,44 94,72 Z" fill="none" stroke="#4a4a7e" stroke-width="1.5"/>

  <!-- Dome slit (opening) -->
  <path d="M58,44 L58,72 L68,72 L68,44 Q64,42 58,44 Z" fill="#1a1a2e"/>

  <!-- Telescope (poking out of slit) -->
  <line x1="63" y1="62" x2="108" y2="14" stroke="#8888bb" stroke-width="3" stroke-linecap="round"/>
  <circle cx="63" cy="62" r="3" fill="#6a6a9e"/>

  <!-- Base building -->
  <rect x="28" y="72" width="72" height="28" rx="2" fill="#222244"/>
  <rect x="28" y="72" width="72" height="28" rx="2" fill="none" stroke="#4a4a7e" stroke-width="1.5"/>

  <!-- Base details — windows with glow -->
  <rect x="40" y="80" width="8" height="10" rx="1" fill="#3a3a5e"/>
  <rect x="40" y="80" width="8" height="10" rx="1" fill="#7c83ff" opacity="0.3"/>

  <rect x="56" y="80" width="8" height="10" rx="1" fill="#3a3a5e"/>
  <rect x="56" y="80" width="8" height="10" rx="1" fill="#7c83ff" opacity="0.3"/>

  <rect x="72" y="80" width="8" height="10" rx="1" fill="#3a3a5e"/>
  <rect x="72" y="80" width="8" height="10" rx="1" fill="#2ecc71" opacity="0.3"/>

  <!-- Ground line -->
  <line x1="10" y1="100" x2="118" y2="100" stroke="#333355" stroke-width="1.5"/>

  <!-- Text -->
  <text x="64" y="118" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7c83ff" letter-spacing="2">OBSERVATORY</text>
</svg>
